services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dentalflow
      POSTGRES_USER: dentalflow
      POSTGRES_PASSWORD: dentalflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentalflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  patient-service:
    build:
      context: .
      dockerfile: patient_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://dentalflow:dentalflow@postgres:5432/dentalflow
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  claims-service:
    build:
      context: .
      dockerfile: claims_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://dentalflow:dentalflow@postgres:5432/dentalflow
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  denial-worker:
    build:
      context: .
      dockerfile: denial_worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://dentalflow:dentalflow@postgres:5432/dentalflow
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      PATIENT_SERVICE_URL: http://patient-service:8001
      CLAIMS_SERVICE_URL: http://claims-service:8002
    depends_on:
      patient-service:
        condition: service_healthy
      claims-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
